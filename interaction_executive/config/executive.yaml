brain_node:
  ros__parameters:
    chat_wait_ms: 20000
    dedup_window_s: 1.0
    # 5/8: 3.0 → 5.0. Adds 2s of confirmation before stranger_alert fires,
    # cutting transient mis-recognitions (hand / glass / object). For full
    # demo silence, override at launch with a large value (e.g. 99999).
    unknown_face_accumulate_s: 5.0
    fallen_accumulate_s: 2.0
    # 2026-05-23 5/27 demo record mode: 手勢只供 Studio trace 視覺化、不直接觸發 Go2 motion
    # _GESTURE_DIRECT 在 brain_node __init__ 被 instance shadow 成 {}
    # 5/28+ 改回 false 即可 revert（不需 code 改）
    gesture_direct_disabled: true
    # 2026-05-23 PM: 5/27 demo video mode — peace 一步觸發 stretch (繞 PendingConfirm OK 二確認)
    # 這條會 override gesture_direct_disabled 對 peace 的影響：peace 仍走 direct trigger
    # 其他手勢 (wave/palm/fist/index) 仍被 gesture_direct_disabled 砍掉
    # 5/28+ 改回 false 即可 revert
    peace_direct_stretch: true
    # 2026-05-23 PM: 5/27 demo video mode — cup+Roy+sitting 複合句
    # 觸發「我看到 Roy 坐著拿著杯子，是口渴了嗎」+ 砍 sit_along auto-TTS
    # 5/28+ 改回 false 即可 revert
    demo_video_cup_compound: true
    demo_video_silent_sit_along: true

interaction_executive_node:
  ros__parameters:
    step_settle_s: 0.4
    tts_idle_timeout_s: 6.0

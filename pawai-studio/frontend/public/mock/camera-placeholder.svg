<svg xmlns="http://www.w3.org/2000/svg" width="360" height="202" viewBox="0 0 360 202">
  <rect width="360" height="202" fill="#0A0A0F"/>
  <!-- Viewfinder frame -->
  <rect x="20" y="15" width="320" height="172" rx="4" fill="none" stroke="#8B8B9E" stroke-width="1.5"/>
  <!-- Corner marks -->
  <path d="M20,35 L20,15 L40,15" fill="none" stroke="#F0F0F5" stroke-width="2.5"/>
  <path d="M320,15 L340,15 L340,35" fill="none" stroke="#F0F0F5" stroke-width="2.5"/>
  <path d="M340,167 L340,187 L320,187" fill="none" stroke="#F0F0F5" stroke-width="2.5"/>
  <path d="M40,187 L20,187 L20,167" fill="none" stroke="#F0F0F5" stroke-width="2.5"/>
  <!-- Crosshair -->
  <line x1="170" y1="101" x2="190" y2="101" stroke="#8B8B9E40" stroke-width="1"/>
  <line x1="180" y1="91" x2="180" y2="111" stroke="#8B8B9E40" stroke-width="1"/>
  <!-- Center text -->
  <text x="180" y="95" text-anchor="middle" fill="#8B8B9E" font-family="Inter,sans-serif" font-size="14" font-weight="500">D435 RGB-D</text>
  <text x="180" y="115" text-anchor="middle" fill="#55556A" font-family="Inter,sans-serif" font-size="10">640 × 480 · 30fps</text>
  <!-- REC indicator -->
  <circle cx="35" cy="28" r="4" fill="#EF4444"/>
  <text x="47" y="32" fill="#EF4444" font-family="Inter,sans-serif" font-size="9" font-weight="600">REC</text>
  <!-- Depth badge -->
  <rect x="280" y="20" width="50" height="16" rx="8" fill="#3B82F620"/>
  <text x="305" y="32" text-anchor="middle" fill="#3B82F6" font-family="Inter,sans-serif" font-size="9">DEPTH</text>
</svg>

amcl:
  ros__parameters:
    use_sim_time: False
    # P0 Nav v3.7: alpha 0.2 → 0.4（quadruped slip 比 wheeled 大）
    alpha1: 0.4
    alpha2: 0.4
    alpha3: 0.4
    alpha4: 0.4
    alpha5: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    # P0 Nav v3.8 (4/29): A2M12 過濾雜訊
    #   laser_min_range 0.20 — 過濾 < 0.20m 的腳邊/Go2 自身雜訊
    #   laser_max_range 8.0  — indoor practical cap，A2M12 名義 12m，但室內 8m 足夠且濾遠距散射
    #   laser_model_type 暫不改（Phase 4B 條件式：若 K1 < 4/5 才切 likelihood_field_prob + do_beamskip）
    laser_max_range: 8.0
    laser_min_range: 0.20
    laser_model_type: "likelihood_field"
    max_beams: 60
    # P0 Nav v3.7: 小空間用較少 particle（500→100, 2000→500）
    max_particles: 500
    min_particles: 100
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::OmniMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    # P0 Nav v3.7: update 門檻降低，低速也頻繁更新
    update_min_a: 0.10
    update_min_d: 0.10
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.1
    z_short: 0.05
    # P0 Nav v3.7: scan topic 改為 RPLIDAR
    scan_topic: /scan_rplidar
    # P0 Nav v3.7: Foxglove 手動設 initial pose（不要 random global localization）
    set_initial_pose: false
    first_map_only: true


name: ROS2 CI

on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'

jobs:
  # ── Tier 1: Fast Gate (< 1 min, no ROS2 container) ──────────────
  fast-gate:
    name: Fast Gate (lint + pure-python tests)
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pytest pytest-cov flake8 numpy opencv-python-headless
      - name: Flake8 lint (report-only)
        run: |
          flake8 speech_processor/ go2_robot_sdk/ face_perception/ \
            vision_perception/ benchmarks/ \
            --max-line-length=100 --extend-ignore=E203 --max-complexity=10 \
            --exit-zero
      - name: Pure Python unit tests (no ROS2 needed)
        env:
          PYTHONPATH: speech_processor:vision_perception:benchmarks
        run: |
          pytest \
            speech_processor/test/test_speech_test_observer.py \
            vision_perception/test/test_gesture_classifier.py \
            vision_perception/test/test_pose_classifier.py \
            vision_perception/test/test_event_builder.py \
            vision_perception/test/test_interaction_rules.py \
            benchmarks/test/test_criteria.py \
            benchmarks/test/test_base_adapter.py \
            benchmarks/test/test_reporter.py \
            benchmarks/test/test_runner.py \
            benchmarks/test/test_monitor.py \
            vision_perception/test/test_mediapipe_pose_mapping.py \
            vision_perception/test/test_gesture_recognizer_backend.py \
            speech_processor/test/test_intent_classifier.py \
            speech_processor/test/test_llm_contract.py \
            -v --tb=short \
            --cov=speech_processor/speech_processor \
            --cov=vision_perception/vision_perception \
            --cov=benchmarks \
            --cov-report=term --cov-report=xml:coverage.xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
      - name: Python syntax check
        run: |
          find . -name '*.py' \
            -not -path './build/*' -not -path './install/*' -not -path './log/*' \
            -not -path './.git/*' -not -path '*/node_modules/*' \
            -print0 | xargs -0 -r python3 -m py_compile
          echo "All Python files pass syntax check."
      - name: Topic contract check (report-only)
        run: python scripts/ci/check_topic_contracts.py || true

  # ── Tier 2: ROS2 Build + colcon test (< 5 min) ─────────────────
  test_environment:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ros_distribution:
          - humble
        include:
          # Humble Hawksbill (May 2022 - May 2027)
          - docker_image: rostooling/setup-ros-docker:ubuntu-jammy-ros-humble-ros-base-latest
            ros_distribution: humble
            ros_version: 2
    container:
      image: ${{ matrix.docker_image }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install libunwind (fix issues on humble)
        run: |
          (sudo apt update && sudo apt install --no-install-recommends libunwind-dev -y) || \
          (apt update && apt install --no-install-recommends libunwind-dev -y) || true
      - name: Install Python dependencies
        run: |
          pip3 install wasmtime aiortc aiohttp cryptography pydub pycryptodome || \
          pip3 install --break-system-packages wasmtime aiortc aiohttp cryptography pydub pycryptodome || true
      - name: build and test
        uses: ros-tooling/action-ros-ci@v0.3
        with:
          target-ros2-distro: ${{ matrix.ros_distribution }}
          vcs-repo-file-url: ""
          skip-tests: false
          # TEMPORARY: scope to core packages only — go2_robot_sdk/lidar_processor_cpp
          # have heavy deps (nav2, PCL, foxglove_bridge) that fail in CI container.
          # TODO: fix rosdep keys or add a separate heavy-deps CI job.
          package-name: >-
            go2_interfaces
            speech_processor
            face_perception
            vision_perception
      - name: Python syntax check
        run: |
          find . -name '*.py' \
            -not -path './build/*' -not -path './install/*' -not -path './log/*' \
            -not -path './.git/*' -not -path '*/node_modules/*' \
            -print0 | xargs -0 -r python3 -m py_compile
          echo "All Python files pass syntax check."

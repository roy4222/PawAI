name: PawAI Studio CI

on:
  push:
    branches: [main]
    paths:
      - 'pawai-studio/**'
      - '.github/workflows/studio-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pawai-studio/**'
      - '.github/workflows/studio-ci.yml'

jobs:
  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pawai-studio/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pawai-studio/frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend — install + import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pawai-studio/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Verify app import
        run: python -c "from mock_server import app; print('mock_server.app OK')"

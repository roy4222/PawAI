# Operational defaults for Jetson + D435.
# These override code defaults where needed.
face_identity_node:
  ros__parameters:
    # YuNet 2023mar for OpenCV 4.11+ (legacy has dynamic shape incompatibility)
    yunet_model: "/home/jetson/face_models/face_detection_yunet_2023mar.onnx"
    sface_model: "/home/jetson/face_models/face_recognition_sface_2021dec.onnx"
    db_dir: "/home/jetson/face_db"
    model_path: "/home/jetson/face_db/model_sface.pkl"
    # Operational thresholds (more permissive than code default 0.90)
    det_score_threshold: 0.35
    min_face_area_ratio: 0.001
    # Jetson real-world tuning: allow noisier bbox association and longer hold
    # to reduce track churn from slight pose/camera jitter.
    track_iou_threshold: 0.15
    track_max_misses: 20
    stable_hits: 2
    unknown_grace_s: 2.5
    # Recognition thresholds (relaxed for D435 + Jetson real-world conditions)
    # 5/8: tightened upper 0.30 → 0.40 to suppress 60%+ stranger false-alerts
    # (hands / glass reflections / skin-tone objects). Lower kept at 0.22 so
    # known faces still resolve quickly.
    sim_threshold_upper: 0.40
    sim_threshold_lower: 0.22
    # Disable compare image (saves bandwidth)
    publish_compare_image: false
    # Always headless on Jetson (no DISPLAY)
    headless: true
    # Max tracked faces
    max_faces: 5
    publish_fps: 8.0

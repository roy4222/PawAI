object_perception_node:
  ros__parameters:
    model_path: "/home/jetson/models/yolo26n.onnx"
    trt_cache_dir: "/home/jetson/trt_cache/"
    color_topic: "/camera/camera/color/image_raw"
    # 2026-05-23 5/27 demo record mode (subagent codebase audit 推薦)
    # 原 threshold=0.5 / input=640 demo 場景召回率不足 (Roy 5/22「效果極差」)
    # threshold 0.5→0.35: 召回率 +5-10% (per-class cooldown 5s 已吸收 false positive)
    # input 640→960: 小物件偵測率最大提升 (FPS 15→~8 仍夠用，瓶頸在 LLM 2s+nav 8s)
    # class_whitelist=[39]: 只認 bottle (COCO #39, 訓練資料最充分的 class)
    # 5/28+ 視 demo 拍完狀況決定是否擴回 P0 subset / 加 CLAHE 後處理
    confidence_threshold: 0.35
    input_size: 960
    tick_period: 0.067
    publish_fps: 8.0
    class_cooldown_sec: 5.0
    # YAML parser pitfall: [39] 會被推成 BYTE_ARRAY (CLAUDE.md 警告)
    # 加 dummy 999 (不存在 COCO class) 強制推成 INTEGER_ARRAY，999 不會被偵測
    class_whitelist: [39, 999]
    # Original whitelist suggestion (P0 subset): [0, 16, 39, 41, 56, 60]
    # = [person, dog, bottle, cup, chair, dining_table]

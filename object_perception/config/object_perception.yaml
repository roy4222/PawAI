object_perception_node:
  ros__parameters:
    model_path: "/home/jetson/models/yolo26n.onnx"
    trt_cache_dir: "/home/jetson/trt_cache/"
    color_topic: "/camera/camera/color/image_raw"
    # 2026-05-23 5/27 demo record mode
    # threshold 0.5→0.35: 召回率 +5-10% (per-class cooldown 5s 吸收 false positive)
    # input_size: 必須 640 (YOLO26n ONNX fixed input、改 960 直接 inference fail)
    # class_whitelist=[41]: 只認 cup (COCO #41) + 999 dummy 強制 INTEGER_ARRAY
    # 5/28+ 視需求擴回 P0 subset / 換大模型 / 加 CLAHE
    confidence_threshold: 0.35
    input_size: 640
    tick_period: 0.067
    publish_fps: 8.0
    class_cooldown_sec: 5.0
    # 5/27 demo video mode: 只認 cup (COCO #41)
    # YAML parser pitfall: [41] 會被推成 BYTE_ARRAY (CLAUDE.md 警告)
    # 加 dummy 999 (不存在 COCO class) 強制推成 INTEGER_ARRAY，999 被 filter 排除
    # 5/28+ 視需求擴回 P0 subset [0, 16, 39, 41, 56, 60]
    class_whitelist: [41, 999]
    # Original whitelist suggestion (P0 subset): [0, 16, 39, 41, 56, 60]
    # = [person, dog, bottle, cup, chair, dining_table]

task: face_detection
description: "人臉偵測模型選型 — Batch 1"

models:
  - name: yunet_2023mar
    adapter: face_yunet
    params:
      model_path: /home/jetson/face_models/face_detection_yunet_2023mar.onnx
      score_threshold: 0.35
      input_size: [320, 320]

    entry_criteria:
      installability: verified
      runtime_viability: verified
      gpu_path: cpu_only
      rationale: "OpenCV Zoo 最新版 YuNet，相容 OpenCV 4.13"
      reject_if: null

    benchmark:
      n_warmup: 50
      n_measure: 200
      input_source: benchmarks/test_inputs/images/

    feasibility_gate:
      min_fps: 3.0
      max_ram_mb: 500
      must_not_crash: true

    quality_gate:
      metrics:
        min_mAP_0.5: 0.60

  - name: scrfd_500m
    adapter: face_scrfd
    params:
      model_path: /home/jetson/face_models/det_500m.onnx
      providers: ["CUDAExecutionProvider", "CPUExecutionProvider"]
      input_size: [640, 640]

    entry_criteria:
      installability: verified
      runtime_viability: unknown
      gpu_path: cuda
      rationale: "InsightFace SCRFD-500M，2.4MB，CUDA EP，預期比 YuNet 更快"
      reject_if: "FPS 無明顯提升 or RAM 超額"

    benchmark:
      n_warmup: 50
      n_measure: 200
      input_source: benchmarks/test_inputs/images/

    feasibility_gate:
      min_fps: 3.0
      max_ram_mb: 500
      must_not_crash: true

    quality_gate:
      metrics:
        min_mAP_0.5: 0.60

  - name: yunet_legacy
    adapter: face_yunet
    params:
      model_path: /home/jetson/face_models/face_detection_yunet_legacy.onnx
      score_threshold: 0.35
      input_size: [320, 320]

    entry_criteria:
      installability: verified
      runtime_viability: failed  # OpenCV 4.13 不支援 dynamic shape
      gpu_path: cpu_only
      rationale: "舊版主線，OpenCV 4.5.4 用。4.13 不相容"
      reject_if: "OpenCV 4.13 載入失敗（已確認）"

    benchmark:
      n_warmup: 50
      n_measure: 200
      input_source: benchmarks/test_inputs/images/

    feasibility_gate:
      min_fps: 3.0
      max_ram_mb: 500
      must_not_crash: true

    quality_gate:
      metrics:
        min_mAP_0.5: 0.60
